services:
  cmr:
    build:
      context: .
      args:
        APP_VERSION: "1.0.0"
        GIT_REF: "v1.0.0"
      dockerfile_inline: |
        FROM composer:2 AS app
        ARG GIT_REF=v1.0.0
        WORKDIR /app
        RUN apk add --no-cache git \
          && git clone --depth 1 --branch $${GIT_REF} https://github.com/monomo71/cmr.git src
        WORKDIR /app/src
        RUN composer install --no-dev --prefer-dist --no-interaction --no-progress --ignore-platform-req=ext-gd

        FROM php:8.3-apache
        ARG APP_VERSION=1.0.0
        LABEL org.opencontainers.image.title="CMR Invultool"
        LABEL org.opencontainers.image.version=$${APP_VERSION}

        RUN apt-get update \
          && apt-get install -y --no-install-recommends curl libsqlite3-dev pkg-config \
          && docker-php-ext-install pdo pdo_mysql pdo_sqlite \
          && a2enmod rewrite headers expires \
          && rm -rf /var/lib/apt/lists/*

        WORKDIR /var/www/html
        COPY --from=app /app/src /var/www/html

        RUN sed -ri -e 's!/var/www/html!/var/www/html/public!g' \
          /etc/apache2/sites-available/*.conf \
          /etc/apache2/apache2.conf \
          /etc/apache2/conf-available/*.conf

        RUN mkdir -p /var/www/html/data /var/www/html/storage/generated \
          && chown -R www-data:www-data /var/www/html/data /var/www/html/storage/generated

        EXPOSE 80
    container_name: cmr
    ports:
      - "8080:80"
    environment:
      TZ: Europe/Amsterdam
      APP_VERSION: "1.0.0"
    volumes:
      - cmr_data:/var/www/html/data
      - cmr_generated:/var/www/html/storage/generated
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/index.php || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  cmr_data:
  cmr_generated:
